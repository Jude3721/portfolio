name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: kbo-dashboard/package-lock.json

      - name: Install dependencies
        working-directory: kbo-dashboard
        run: npm ci

      - name: Build kbo-dashboard
        working-directory: kbo-dashboard
        run: npm run build

      - name: Prepare deployment site
        run: |
          mkdir -p _site
          # 기존 정적 파일 복사
          cp -r jdkim-project _site/jdkim-project
          # kbo-dashboard 빌드 결과물 복사
          mkdir -p _site/kbo-dashboard
          cp -r kbo-dashboard/dist/. _site/kbo-dashboard/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
