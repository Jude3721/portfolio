name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'nba-dashboard/src/**'
      - 'nba-dashboard/server/**'
      - 'nba-dashboard/vite.config.js'
      - 'nba-dashboard/package*.json'
      - 'nba-dashboard/.env.production'
      - 'kbo-dashboard/src/**'
      - 'kbo-dashboard/vite.config.js'
      - 'kbo-dashboard/package*.json'
      - 'kbo-dashboard/.env.production'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build NBA Dashboard
        working-directory: nba-dashboard
        run: |
          npm ci
          npm run build
          cp dist/index.html .
          rm -f assets/*.js assets/*.css
          cp dist/assets/* assets/

      - name: Build KBO Dashboard
        working-directory: kbo-dashboard
        run: |
          npm ci
          npm run build
          cp dist/index.html .
          rm -f assets/*.js assets/*.css
          cp dist/assets/* assets/

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nba-dashboard/index.html nba-dashboard/assets/
          git add kbo-dashboard/index.html kbo-dashboard/assets/
          git diff --staged --quiet || git commit -m "ci: 자동 빌드 배포"
          git pull --rebase origin main
          git push

      - name: Deploy NBA Backend to Render
        if: ${{ secrets.RENDER_DEPLOY_HOOK != '' }}
        run: curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
